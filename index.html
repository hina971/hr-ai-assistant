<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            justify-content: flex-end;
        }
        
        .bot-message {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .user-message .message-content {
            background: #2a5298;
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .bot-message .message-content {
            background: #e2e8f0;
            color: #2d3748;
            border-bottom-left-radius: 5px;
        }
        
        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .chat-input input:focus {
            border-color: #2a5298;
        }
        
        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        
        .chat-input button:hover {
            transform: scale(1.05);
        }
        
        .typing {
            color: #a0aec0;
            font-style: italic;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #2a5298;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🏢 HR AI Assistant</h1>
            <p>💬 HR Policies • Recruitment • Employee Relations | 24/7 Available</p>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <div class="message-content">✨ Assalamualaikum! ✨<br><br>Main HR AI Assistant hoon. Main aapki help kar sakta hoon:<br><br>📋 HR Policies<br>📝 Recruitment & Hiring<br>👥 Employee Relations<br>🎓 Training & Development<br>⚖️ Company Rules<br><br>Koi sawaal poochiye! 😊</div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Roman Urdu, Hindi ya English mein likhiye..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send 📤</button>
        </div>
    </div>

    <script>
        // Hugging Face API Setup
        // YAHAN APNA TOKEN PASTE KARO
        const HF_TOKEN = "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"; // <-- CHANGE THIS
        
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            addTypingIndicator();
            
            try {
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/microsoft/phi-2",
                    {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${HF_TOKEN}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            inputs: `[HR Assistant] User: ${message}\nHR Assistant (professional, helpful, expert in HR policies, recruitment, employee relations): `,
                            parameters: {
                                max_new_tokens: 200,
                                temperature: 0.7,
                                do_sample: true
                            }
                        })
                    }
                );
                
                const data = await response.json();
                removeTypingIndicator();
                
                let reply = "Mujhe maafi chahiye, main samajh nahi paya. Kya aap dobara pooch sakte hain?";
                
                if (data && data[0] && data[0].generated_text) {
                    let generated = data[0].generated_text;
                    const assistantPart = generated.split("HR Assistant:")[1];
                    if (assistantPart) {
                        reply = assistantPart.trim();
                    } else {
                        reply = generated.replace(`[HR Assistant] User: ${message}`, "").trim();
                    }
                }
                
                addMessage(reply, 'bot');
            } catch (error) {
                removeTypingIndicator();
                console.error(error);
                addMessage("⚠️ Error aa gaya! Token check karo ya thodi der baad try karo. 🔧", 'bot');
            }
        }
        
        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addTypingIndicator() {
            const messagesDiv = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'message bot-message';
            typingDiv.innerHTML = `<div class="message-content typing">🤔 HR Assistant soch raha hai...</div>`;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
