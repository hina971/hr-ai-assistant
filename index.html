<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            justify-content: flex-end;
        }
        
        .bot-message {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .user-message .message-content {
            background: #2a5298;
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .bot-message .message-content {
            background: #e2e8f0;
            color: #2d3748;
            border-bottom-left-radius: 5px;
        }
        
        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .chat-input input:focus {
            border-color: #2a5298;
        }
        
        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        
        .chat-input button:hover {
            transform: scale(1.05);
        }
        
        .typing {
            color: #a0aec0;
            font-style: italic;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #2a5298;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🏢 HR AI Assistant</h1>
            <p>💬 HR Policies • Recruitment • Employee Relations | 24/7 Available</p>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <div class="message-content">✨ Assalamualaikum! ✨<br><br>Main HR AI Assistant hoon. Main aapki help kar sakta hoon:<br><br>📋 HR Policies<br>📝 Recruitment & Hiring<br>👥 Employee Relations<br>🎓 Training & Development<br>⚖️ Company Rules<br><br>Koi sawaal poochiye! 😊</div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Roman Urdu, Hindi ya English mein likhiye..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send 📤</button>
        </div>
    </div>

    <script>
        // ============================================
        // HR ASSISTANT - NO TOKEN REQUIRED
        // Yeh code bilkul kaam karega, token ki zaroorat nahi!
        // ============================================
        
        function getHRResponse(userMessage) {
            const msg = userMessage.toLowerCase().trim();
            
            // Greetings
            if (msg.includes("hello") || msg.includes("hi") || msg.includes("assalam") || msg.includes("salam")) {
                return "Assalamualaikum! Main HR Assistant hoon. Aap HR se related koi bhi sawaal pooch sakte hain! 😊";
            }
            
            // Leave Policy
            if (msg.includes("leave") || msg.includes("chutti") || msg.includes("vacation") || msg.includes("holiday")) {
                return "📋 **Leave Policy:**\n\n• Annual Leave: 20 days per year\n• Sick Leave: 10 days per year\n• Casual Leave: 5 days per year\n• Maternity/Paternity Leave: As per company policy\n\nLeave apply karne ke liye apne manager se approve karwayein aur HR ko inform karein.";
            }
            
            // Attendance / Late Coming
            if (msg.includes("attendance") || (msg.includes("late") && msg.includes("coming")) || msg.includes("haziri")) {
                return "⏰ **Attendance Policy:**\n\n• Working hours: 9:00 AM - 6:00 PM\n• Grace period: 15 minutes\n• 3 times late allowed per month\n• Iske baad deduction apply hoga\n\nAgar regularly late ho rahe ho toh transport ya shift change ke baare mein baat kar sakte ho.";
            }
            
            // Hiring / Recruitment
            if (msg.includes("hire") || msg.includes("recruitment") || msg.includes("job") || msg.includes("bharti") || msg.includes("vacancy")) {
                return "📝 **Recruitment Process:**\n\n1. Job posting (internal/external)\n2. Application submit karein\n3. Initial screening\n4. Technical interview\n5. HR interview\n6. Offer letter\n\nKisi specific position ke liye job description chahiye? Batao!";
            }
            
            // Salary / Payslip
            if (msg.includes("salary") || msg.includes("tan_khwa") || msg.includes("payslip") || msg.includes("tanqeed") || msg.includes("increment")) {
                return "💰 **Salary Related:**\n\n• Salary date: 1st of every month\n• Payslip: HRMS portal se download karein\n• Increment: Annual performance review ke baad\n• Overtime: Approval required, additional pay\n\nAgar salary mein koi issue hai toh accounts@company.com par mail karein.";
            }
            
            // Probation Period
            if (msg.includes("probation") || msg.includes("test period") || (msg.includes("new") && msg.includes("job"))) {
                return "📅 **Probation Period:**\n\n• Duration: 6 months\n• Performance review: Quarterly\n• Confirmation: Probation completion ke baad\n• Benefits: Full benefits during probation\n\nProbation ke dauran bhi aap full employee ki tarah eligible ho.";
            }
            
            // Resignation / Notice Period
            if (msg.includes("resign") || msg.includes("quit") || msg.includes("chorna") || msg.includes("notice") || msg.includes("istifa")) {
                return "📄 **Resignation Process:**\n\n• Notice period: 30 days\n• Resignation letter email karein: hr@company.com\n• Exit interview\n• Full & Final settlement: Last working day ke 45 days baad\n\nResignation accept hone ke baad relieving letter diya jayega.";
            }
            
            // Performance Review
            if (msg.includes("performance") || msg.includes("review") || msg.includes("kar_kardagi") || msg.includes("appraisal")) {
                return "⭐ **Performance Review:**\n\n• Frequency: Half-yearly (June & December)\n• Self-assessment form bharwana hoga\n• Manager review\n• HR final review\n• Feedback session\n\nAgar improvement areas hain toh hum training provide karte hain.";
            }
            
            // Training / Development
            if (msg.includes("training") || msg.includes("sikhna") || msg.includes("development") || msg.includes("course")) {
                return "🎓 **Training & Development:**\n\n• Internal training sessions\n• Online courses (Udemy, LinkedIn Learning)\n• Technical certifications\n• Soft skills workshops\n\nTraining request HR ko email karein, department budget mein available hai.";
            }
            
            // Complaint / Grievance
            if (msg.includes("complain") || msg.includes("shikayat") || msg.includes("grievance") || (msg.includes("problem") && (msg.includes("boss") || msg.includes("manager")))) {
                return "⚖️ **Grievance Handling:**\n\n1. Pehle apne immediate supervisor se baat karein\n2. Agar issue solve nahi hota, HR ko email karein: hr@company.com\n3. Anonymous complaint bhi file kar sakte ho\n\nConfidentiality guarantee hai. Koi bhi retaliation tolerate nahi ki jayegi.";
            }
            
            // Promotion
            if (msg.includes("promotion") || msg.includes("taraqqi") || msg.includes("next level") || msg.includes("upgrade")) {
                return "📈 **Promotion Criteria:**\n\n• Minimum 1 year in current role\n• Performance rating: 4+ out of 5\n• Skill assessment\n• Manager recommendation\n• Business need\n\nPromotion cycle: January & July. Prepare well!";
            }
            
            // Health Insurance / Benefits
            if (msg.includes("insurance") || msg.includes("health") || msg.includes("bema") || msg.includes("benefit") || (msg.includes("medical") && msg.includes("claim"))) {
                return "🏥 **Health Benefits:**\n\n• Medical insurance: Self, spouse, 2 children\n• Coverage: Up to 500,000 per year\n• Dental & vision coverage\n• Maternity benefits\n\nClaim process: Panel hospitals mein cashless treatment, otherwise reimbursement. Insurance card HR se le sakte ho.";
            }
            
            // Termination / Firing
            if (msg.includes("terminate") || msg.includes("fire") || msg.includes("nikalna") || msg.includes("removal")) {
                return "⚠️ **Termination Policy:**\n\n• Performance improvement plan (PIP) after warning\n• Show-cause notice\n• Inquiry committee\n• Final decision by management\n\nTermination ke case mein outstanding dues aur experience letter diya jayega.";
            }
            
            // Working Hours / Overtime
            if (msg.includes("timing") || msg.includes("shift") || msg.includes("overtime") || msg.includes("extra time")) {
                return "🕐 **Working Hours:**\n\n• Regular shift: 9 AM - 6 PM (Mon-Fri)\n• Night shift: 8 PM - 5 AM\n• Overtime: Prior approval required\n• OT rate: 1.5x of hourly wage\n\nShift change request manager approval ke baad HR ko bhejein.";
            }
            
            // Employee ID / Access Card
            if (msg.includes("id card") || msg.includes("access") || msg.includes("badge") || msg.includes("entry")) {
                return "🪪 **Employee ID Card:**\n\n• New joiners: HR se collect karein (first day)\n• Lost card: Immediately report karein\n• Replacement fee: 500 (deducted from salary)\n• Card is property of company - return on exit\n\nAccess issues ke liye facility management se contact karein.";
            }
            
            // Reference / Recommendation Letter
            if (msg.includes("reference") || msg.includes("recommendation") || msg.includes("letter") || msg.includes("experience certificate")) {
                return "📜 **Experience & Reference:**\n\n• Experience letter: Exit ke waqt diya jata hai\n• Reference checks: HR handles\n• Recommendation letter: Manager se request karein\n\nReference letter mein designation aur service period mention hota hai.";
            }
            
            // Company Policies / General
            if (msg.includes("policy") || msg.includes("rule") || msg.includes("qanoon") || msg.includes("regulation")) {
                return "📚 **Company Policies:**\n\n• Employee Handbook HR portal par available hai\n• Key policies: Code of Conduct, Anti-Harassment, Data Security\n• Policy violations lead to disciplinary action\n\nKisi specific policy ke baare mein poochiye, main detail bata dunga.";
            }
            
            // Help / Menu
            if (msg.includes("help") || msg.includes("kya kar") || msg.includes("menu") || msg.includes("options")) {
                return "🔍 **Main in cheezon mein help kar sakta hoon:**\n\n• Leave Policy (chuttiyan)\n• Attendance Rules (haziri)\n• Recruitment Process (bharti)\n• Salary & Payslip (tan_khwa)\n• Probation Period (test period)\n• Resignation (istifa)\n• Performance Review (kar_kardagi)\n• Training (sikhna)\n• Complaint/Grievance (shikayat)\n• Promotion (taraqqi)\n• Health Insurance (bema)\n• Working Hours (timing)\n\nSubject likhkar poochiye, example: 'Leave policy kya hai?'";
            }
            
            // Thank You
            if (msg.includes("thank") || msg.includes("shukriya")) {
                return "Aapka shukriya! 🤗 Koi aur sawaal ho toh batao, main help karunga.";
            }
            
            // Bye
            if (msg.includes("bye") || msg.includes("allah hafiz") || msg.includes("khuda hafiz")) {
                return "Allah Hafiz! 👋 Agar koi HR issue ho toh wapas aana, main help karunga. Take care! 😊";
            }
            
            // Koi match nahi mila toh default reply
            return "🤔 **Thoda specific batao:**\n\nMain HR se related sawaalon ke jawab deta hoon. Jaise:\n\n• 'Leave policy kya hai?'\n• 'Salary slip kaise milegi?'\n• 'Promotion criteria kya hai?'\n• 'Resignation process batao'\n\nAgar 'help' likho toh main puri list bata dunga!";
        }
        
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;
            
            // User message show karo
            addMessage(message, 'user');
            input.value = '';
            
            // Typing indicator
            addTypingIndicator();
            
            // Thoda delay real feel ke liye
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // Jawab generate karo
            const reply = getHRResponse(message);
            
            removeTypingIndicator();
            addMessage(reply, 'bot');
        }
        
        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            // Replace newlines with <br>
            const formattedText = text.replace(/\n/g, '<br>');
            messageDiv.innerHTML = `<div class="message-content">${formattedText}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addTypingIndicator() {
            const messagesDiv = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'message bot-message';
            typingDiv.innerHTML = `<div class="message-content typing">🤔 HR Assistant soch raha hai...</div>`;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }
        
        // Enter key press support
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
